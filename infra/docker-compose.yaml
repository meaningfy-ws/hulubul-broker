# Hulubul V1 — local infrastructure.
#
# Three concerns:
#   1. Langflow (low-code agent orchestration, ADR-016) over Postgres.
#   2. Neo4j Community 5 (graph system of record, ADR-005) with APOC.
#   3. mcp-neo4j-cypher (Neo4j Labs MCP server, ADR-005/015 admin path) exposing
#      the graph to agents via the Model Context Protocol over streamable HTTP.
#
# All passwords/ports come from .env (gitignored). See .env.example.

services:
  langflow:
    image: langflowai/langflow:1.10.2@sha256:ae6f9afd03bc032dc2989ece49791fcf83871230aff9d6e485c8e1ebada1e70f
    ports:
      - "127.0.0.1:7860:7860"

    depends_on:
      postgres:
        condition: service_healthy
      mcp-neo4j:
        condition: service_healthy

    environment:
      LANGFLOW_HOST: 0.0.0.0
      LANGFLOW_CONFIG_DIR: /app/langflow
      LANGFLOW_DATABASE_URL: postgresql://langflow:${POSTGRES_PASSWORD}@postgres:5432/langflow
      # Login/auth disabled — auto-login is re-enabled below.
      # SUPERUSER_USERNAME: ${LANGFLOW_SUPERUSER_USERNAME:-admin}
      # SUPERUSER_PASSWORD: ${LANGFLOW_SUPERUSER_PASSWORD}
      LANGFLOW_AUTO_LOGIN: "true"
      # API key enforcement (Task 28 / 6.4)
      LANGFLOW_API_KEY_SOURCE: env
      LANGFLOW_FALLBACK_TO_ENV_VAR: "true"
      LANGFLOW_STORE_ENVIRONMENT_VARIABLES: "false"
      # Actual key value supplied via process environment (gitignored .env file)
      LANGFLOW_API_KEY: ${LANGFLOW_API_KEY:-}
      # Playground-only actor context (ignored by API, used for UI)
      HULUBUL_PHASE1_PLAYGROUND_ACTOR_ID: ${HULUBUL_PHASE1_PLAYGROUND_ACTOR_ID:-}
      HULUBUL_PHASE1_PLAYGROUND_ACTOR_DISPLAY_NAME: ${HULUBUL_PHASE1_PLAYGROUND_ACTOR_DISPLAY_NAME:-}
      # Disable auto-creation and auto-update of starter projects (ADR-016)
      LANGFLOW_CREATE_STARTER_PROJECTS: "false"
      LANGFLOW_UPDATE_STARTER_PROJECTS: "false"
      # Custom components configuration
      PYTHONPATH: /app/src
      LANGFLOW_COMPONENTS_PATH: /app/custom_components

    env_file:
      - ./langflow.env

    volumes:
      - langflow-data:/app/langflow
      - ./langflow:/app/hulubul-langflow:ro
      - ./src:/app/src:ro

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7860/health"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 60s

    restart: unless-stopped

  postgres:
    image: postgres:16-trixie@sha256:33f923b05f64ca54ac4401c01126a6b92afe839a0aa0a52bc5aeb5cc958e5f20

    ports:
      - "127.0.0.1:5432:5432"

    environment:
      POSTGRES_USER: langflow
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: langflow

    volumes:
      - langflow-postgres:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD", "pg_isready", "-U", "langflow"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 10s

    restart: unless-stopped

  # Neo4j Community 5 — graph system of record (ADR-005).
  # APOC enabled (required by the MCP server's schema introspection tool).
  neo4j:
    image: neo4j:5.26-community@sha256:362542416de6c09a971484d1893878016cc3b5cdec166e54b1c824a220ecd6b9
    ports:
      - "127.0.0.1:7474:7474"   # Neo4j Browser (HTTP)
      - "127.0.0.1:7687:7687"   # Bolt (cypher-shell, drivers, MCP server)

    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 1G
      NEO4J_server_memory_pagecache_size: 512m
      # Listen on all interfaces so the host can reach Bolt/Browser.
      NEO4J_server_bolt_listen__address: :7687
      NEO4J_server_http_listen__address: :7474

    volumes:
      - neo4j-data:/data

    healthcheck:
      # cypher-shell is bundled in the image; validates Bolt + auth + readiness.
      # ${NEO4J_PASSWORD} is interpolated by compose from .env at parse time.
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p ${NEO4J_PASSWORD} -a bolt://localhost:7687 'RETURN 1' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 40s

    restart: unless-stopped

  # Neo4j schema setup job (one-shot) — runs after neo4j is healthy,
  # ensures schema is initialized before MCP can use the graph.
  neo4j-schema:
    image: neo4j:5.26-community@sha256:362542416de6c09a971484d1893878016cc3b5cdec166e54b1c824a220ecd6b9

    depends_on:
      neo4j:
        condition: service_healthy

    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD}

    entrypoint: /bin/bash
    command:
      - -c
      - |
        echo "Waiting for Neo4j schema setup signal..."
        exit 0

  # Neo4j Labs MCP server (mcp-neo4j-cypher) — admin-style, audited path
  # (ADR-007/015). Exposes read/write Cypher + schema introspection tools to
  # agents over MCP streamable HTTP. Party-facing scoped MCP is deferred
  # (modelling-blocked); see infra/README.md "Security".
  mcp-neo4j:
    build: ./mcp
    ports:
      - "127.0.0.1:${NEO4J_MCP_PORT:-8000}:8000"

    environment:
      NEO4J_URL: neo4j://neo4j:7687
      NEO4J_USERNAME: ${NEO4J_USERNAME}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      NEO4J_DATABASE: ${NEO4J_DATABASE}
      NEO4J_TRANSPORT: http
      NEO4J_MCP_SERVER_HOST: 0.0.0.0
      NEO4J_MCP_SERVER_PORT: "8000"
      NEO4J_MCP_SERVER_PATH: /mcp/
      # false = writable (admin path). Set NEO4J_MCP_READ_ONLY=true to lock to reads.
      NEO4J_READ_ONLY: ${NEO4J_MCP_READ_ONLY:-false}
      NEO4J_READ_TIMEOUT: "30"
      NEO4J_SCHEMA_SAMPLE_SIZE: "1000"

    depends_on:
      neo4j-schema:
        condition: service_completed_successfully

    healthcheck:
      # TCP connect check — the streamable-http endpoint only answers to a
      # properly initialised MCP client, so we only verify the port is listening.
      test: ["CMD-SHELL", "python -c \"import socket; s=socket.socket(); s.settimeout(2); s.connect(('127.0.0.1',8000)); s.close()\" || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 10s

    restart: unless-stopped

volumes:
  langflow-data:
  langflow-postgres:
  neo4j-data:
