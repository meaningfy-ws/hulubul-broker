[tox]
env_list = py310, architecture, schemas
isolated_build = true

# Base environment: package the wheel (so `hulubul` is importable exactly as
# it will be installed) and pin the direct test dependencies to the versions
# locked in [tool.poetry.group.test.dependencies] (pyproject.toml, Task 2).
[testenv]
package = wheel
deps =
    pytest==8.4.1
    pytest-bdd==8.1.0
    pytest-cov==7.0.0
commands =
    python -c "import pathlib; pathlib.Path('reports').mkdir(exist_ok=True)"
    pytest {posargs}

# Default env: fast unit tests with branch coverage, gated at the
# [tool.coverage.report] fail_under floor.
[testenv:py310]
description = Run the unit test suite with branch coverage
commands =
    pytest --cov=hulubul --cov-report=term-missing tests/unit tests/static

# Default env: enforce the layered-architecture import contracts.
[testenv:architecture]
description = Enforce import-linter architectural boundaries
deps =
    import-linter==2.3
commands =
    lint-imports

# Default env: lint the LinkML source-of-truth schema (make lint equivalent).
[testenv:schemas]
description = Lint the LinkML domain schema
deps =
commands =
    linkml-lint -c .linkmllint.yaml model/linkml/hulubul.yaml

# Non-default: integration tests against real adapters (e.g. Testcontainers
# Neo4j). Opt in with `tox -e integration`.
[testenv:integration]
description = Run integration tests against real adapters
deps =
    pytest==8.4.1
    pytest-cov==7.0.0
    httpx==0.28.1
    neo4j==5.28.2
    testcontainers[neo4j]==4.10.0
commands =
    pytest -m integration tests

# Non-default: end-to-end system tests. Opt in with `tox -e system`.
[testenv:system]
description = Run end-to-end system tests
commands =
    pytest -m system tests

# Non-default: offline evaluation suite (fixtures/recorded data, no live
# model calls). Opt in with `tox -e evaluation`.
[testenv:evaluation]
description = Run the offline evaluation suite
commands =
    pytest -m evaluation tests

# Non-default, deliberately excluded from `env_list`: evaluation against a
# live model provider. Costs money/quota and is non-deterministic, so it must
# be run explicitly with `tox -e evaluation-live`, never in default CI runs.
[testenv:evaluation-live]
description = Run the evaluation suite against a live model (opt-in only)
commands =
    pytest -m "evaluation and live_model" tests
