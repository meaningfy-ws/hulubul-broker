name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  static-quality:
    name: Static quality gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Poetry
        run: pipx install poetry==2.3.2

      - name: Install project dependencies
        run: make install

      - name: Run static quality gates
        run: make ci-static
